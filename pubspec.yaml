name: lensa
description: Local-first museum guide app for The Metropolitan Museum of Art.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.10.5
  sqflite: ^2.3.0
  path_provider: ^2.1.1
  audioplayers: ^5.2.1
  http: ^1.1.0
  cached_network_image: ^3.3.0
  permission_handler: ^11.0.1
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  shared_preferences: ^2.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/database/
    - assets/audio/
